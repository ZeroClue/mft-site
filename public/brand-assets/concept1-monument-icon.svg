<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" width="48" height="48">
  <!-- Warm taupe background -->
  <rect width="48" height="48" fill="#8B7355"/>

  <!-- M monogram - off-white -->
  <text x="4" y="42" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="44" fill="#F5F0EB">
    M
  </text>

  <!-- Plus superscript -->
  <text x="30" y="20" font-family="'Georgia', serif" font-weight="700" font-size="18" fill="#F5F0EB">
    +
  </text>
</svg>
